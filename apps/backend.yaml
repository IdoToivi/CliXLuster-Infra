apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clixluster-backend-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/IdoToivi/CliXLuster-Infra.git'
    targetRevision: main
    path: manifests/backend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: clixluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
