apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clixluster-frontend-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ido1t7/CliXLuster-Infra.git' # מאגר התשתיות שלך
    targetRevision: HEAD
    path: frontend # התיקייה שבה נמצאים המניפסטים המפוצלים
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: clixluster # קוברנטיס ייצור את ה-namespace הזה אוטומטית
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true