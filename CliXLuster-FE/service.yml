apiVersion: v1
kind: Service
metadata:
  name: clixluster-frontend-svc
  namespace: clixluster
spec:
  type: NodePort # מאפשר גישה קלה בקלאסטר לוקאלי
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080 # תוכל לגשת לזה ב-localhost:30080
    protocol: TCP
  selector:
    app: clixluster-frontend