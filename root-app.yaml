apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clixluster-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/IdoToivi/CliXLuster-Infra.git'
    targetRevision: main
    # מצביע לתיקייה שמכילה רק Application CRDs (frontend/redis/backend).
    # זהו ה-"App of Apps": Argo יסנכרן את כל ה-Applications שמתחת ל-apps/.
    path: apps
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    # ה-Application objects עצמם חיים ב-namespace של argocd
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
