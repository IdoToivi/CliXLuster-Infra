apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clixluster-redis-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/IdoToivi/CliXLuster-Infra.git'
    targetRevision: HEAD
    path: CliXLuster-BE/redis
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: clixluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true